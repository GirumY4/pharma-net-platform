<svg width="440" height="110" viewBox="0 0 440 110" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Alyah Pharma Net Logo – Dark">
  <defs>
    <linearGradient id="iconGradD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
    <linearGradient id="goldGradD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#D4940A"/>
    </linearGradient>
    <filter id="iconShadowD" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#10B981" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Icon -->
  <g filter="url(#iconShadowD)">
    <circle cx="55" cy="55" r="46" fill="url(#iconGradD)"/>
    <rect x="48" y="28" width="14" height="54" rx="4" fill="#ffffff"/>
    <rect x="28" y="48" width="54" height="14" rx="4" fill="#ffffff"/>
  </g>

  <!-- Text -->
  <g transform="translate(122, 18)">
    <text x="0" y="38" font-family="'Inter Tight', 'Inter', system-ui, sans-serif" font-size="36" font-weight="800" fill="#F8FAFC" letter-spacing="-1">ALYAH</text>
    <circle cx="165" cy="34" r="4" fill="url(#goldGradD)"/>
    <text x="0" y="62" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="600" fill="#34D399" letter-spacing="5">PHARMA NET</text>
    <rect x="0" y="71" width="280" height="1.5" rx="1" fill="url(#goldGradD)" opacity="0.7"/>
    <text x="0" y="88" font-family="'Inter', system-ui, sans-serif" font-size="10.5" font-weight="400" fill="#94A3B8" letter-spacing="1.5">CONNECTING PHARMACIES · EMPOWERING PATIENTS</text>
  </g>
</svg>