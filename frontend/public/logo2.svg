<!-- public/logo.svg -->
<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Alyah Pharma Net Logo">
  <!-- Background Gradient (for light mode) -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F8B6C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#064E3B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DDAA4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8A5F16;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Logo Icon: Medical Cross + Pill Abstract -->
  <g transform="translate(20, 20)" filter="url(#softShadow)">
    <!-- Outer Circle -->
    <circle cx="40" cy="40" r="38" fill="url(#logoGradient)" stroke="#FFFFFF" stroke-width="2"/>
    
    <!-- Inner White Circle -->
    <circle cx="40" cy="40" r="32" fill="#FFFFFF"/>
    
    <!-- Medical Cross (Green) -->
    <rect x="34" y="18" width="12" height="44" rx="2" fill="#0F8B6C"/>
    <rect x="18" y="34" width="44" height="12" rx="2" fill="#0F8B6C"/>
    
    <!-- Gold Accent Ring -->
    <circle cx="40" cy="40" r="36" fill="none" stroke="url(#goldAccent)" stroke-width="1.5" stroke-dasharray="4 2"/>
    
    <!-- Subtle Pill Shape (Abstract) -->
    <ellipse cx="40" cy="40" rx="18" ry="8" fill="none" stroke="#DDAA4A" stroke-width="1" opacity="0.6"/>
  </g>
  
  <!-- App Name Text -->
  <g transform="translate(100, 45)">
    <!-- "Alyah" - Primary Brand -->
    <text x="0" y="0" 
          font-family="'Inter Tight', 'Inter', system-ui, sans-serif" 
          font-size="28" 
          font-weight="800" 
          fill="#1E293B"
          letter-spacing="-0.5">
      Alyah
    </text>
    
    <!-- "Pharma Net" - Secondary -->
    <text x="0" y="28" 
          font-family="'Inter', system-ui, sans-serif" 
          font-size="20" 
          font-weight="600" 
          fill="#0F8B6C"
          letter-spacing="0.5">
      Pharma Net
    </text>
    
    <!-- Gold Divider Line -->
    <line x1="0" y1="34" x2="260" y2="34" 
          stroke="url(#goldAccent)" 
          stroke-width="2" 
          stroke-linecap="round"/>
    
    <!-- Tagline (Optional) -->
    <text x="0" y="52" 
          font-family="'Inter', system-ui, sans-serif" 
          font-size="11" 
          font-weight="500" 
          fill="#64748B"
          letter-spacing="0.8">
      Connecting Pharmacies • Empowering Patients
    </text>
  </g>
  
  <!-- Decorative Gold Corner Accent (Premium Touch) -->
  <path d="M 370 10 L 390 10 L 390 30" 
        stroke="url(#goldAccent)" 
        stroke-width="2" 
        fill="none" 
        stroke-linecap="round"/>
</svg>
