<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Alyah Pharma-Net Logo">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F8B6C" />
      <stop offset="100%" stop-color="#064E3B" />
    </linearGradient>
    
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DDAA4A" />
      <stop offset="100%" stop-color="#8A5F16" />
    </linearGradient>
    
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#064E3B" flood-opacity="0.15"/>
    </filter>
  </defs>

  <g transform="translate(20, 20)" filter="url(#softShadow)">
    <rect width="80" height="80" rx="22" fill="url(#logoGradient)" />
    
    <path d="M 33 22 h 14 v 11 h 11 v 14 h -11 v 11 h -14 v -11 h -11 v -14 h 11 z" fill="#FFFFFF" />
    
    <rect x="36" y="36" width="8" height="8" rx="2" fill="url(#goldAccent)" />
  </g>

  <g transform="translate(125, 66)">
    <text x="0" y="0" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="38" letter-spacing="-0.5">
      <tspan font-weight="800" fill="#1E293B">Alyah </tspan>
      <tspan font-weight="500" fill="#0F8B6C">Pharma-Net</tspan>
    </text>
    
    <text x="2" y="24" 
          font-family="'Inter', system-ui, -apple-system, sans-serif" 
          font-size="11" 
          font-weight="700" 
          fill="#94A3B8"
          letter-spacing="3.5"
          text-transform="uppercase">
      Workspace Management
    </text>
  </g>
</svg>
